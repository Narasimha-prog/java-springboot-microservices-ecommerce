spring:
  application:
    name: product-service


  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888
logging:
  level:
    org.springframework.security: DEBUG

    # THIS IS THE TRACE COMMAND: Shows the actual values (UUID, Role)
    org.hibernate.orm.jdbc.bind: trace
    # Optional: Shows the results extracted from the Database
    org.hibernate.orm.jdbc.extract: trace
    # Optional: Shows the SQL logic and execution
    org.hibernate.sql: debug