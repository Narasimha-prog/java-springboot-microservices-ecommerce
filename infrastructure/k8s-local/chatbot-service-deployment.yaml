apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../../compose.yml
    kompose.version: 1.32.0 (765fde254)
  labels:
    io.kompose.service: chatbot-service
  name: chatbot-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: chatbot-service
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../../compose.yml
        kompose.version: 1.32.0 (765fde254)
      labels:
        io.kompose.network/java-springboot-microservices-ecommerce-backend: "true"
        io.kompose.service: chatbot-service
    spec:
      containers:
        - env:
            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  key: DB_PASSWORD
                  name: env
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  key: DB_URL
                  name: env
            - name: DB_USER_NAME
              valueFrom:
                configMapKeyRef:
                  key: DB_USER_NAME
                  name: env
            - name: EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE
              value: http://register-server:8761/eureka/
            - name: M_DB
              valueFrom:
                configMapKeyRef:
                  key: M_DB
                  name: env
            - name: RAZORPAY_KEY
              valueFrom:
                configMapKeyRef:
                  key: RAZORPAY_KEY
                  name: env
            - name: RAZORPAY_VALUE
              valueFrom:
                configMapKeyRef:
                  key: RAZORPAY_VALUE
                  name: env
            - name: SECRET
              valueFrom:
                configMapKeyRef:
                  key: SECRET
                  name: env
            - name: SPRING_AI_OLLAMA_BASE_URL
              value: http://host.docker.internal:11434
            - name: SPRING_AI_VECTORSTORE_CHROMA_CLIENT_HOST
              value: http://chromadb
            - name: SPRING_AI_VECTORSTORE_CHROMA_CLIENT_PORT
              value: "8000"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: SPRING_PROFILES_ACTIVE
              value: dev,docker
            - name: WEB
              valueFrom:
                configMapKeyRef:
                  key: WEB
                  name: env
            - name: app_password
              valueFrom:
                configMapKeyRef:
                  key: app_password
                  name: env
          image: lnreddydev/chatbot-service:latest
          name: chatbot-service
          ports:
            - containerPort: 9999
              protocol: TCP
      restartPolicy: Always
