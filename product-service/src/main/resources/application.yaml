spring:
  application:
    name: product-service


  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888

file:
  storage:
    # Use 8080 if you want traffic to go through your Gateway
    # Use 8083 if you want the frontend to talk directly to the Product Service
    base-url: http://localhost:8080/uploads/
logging:
  level:
    org.springframework.security: DEBUG

    # THIS IS THE TRACE COMMAND: Shows the actual values (UUID, Role)
    org.hibernate.orm.jdbc.bind: trace
    # Optional: Shows the results extracted from the Database
    org.hibernate.orm.jdbc.extract: trace
    # Optional: Shows the SQL logic and execution
    org.hibernate.sql: debug