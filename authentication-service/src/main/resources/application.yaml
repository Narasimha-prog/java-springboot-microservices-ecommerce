spring:
  application:
    name: authentication-service

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  profiles:
    active: dev

  config:
    import: optional:configserver:http://localhost:8888
---
#  DOCKER CONTAINER NETWORK OVERRIDES
spring:
  config:
    activate:
      on-profile: docker
    # Tells the container to find the config server via its container mesh name
    import: optional:configserver:http://config-server:8888