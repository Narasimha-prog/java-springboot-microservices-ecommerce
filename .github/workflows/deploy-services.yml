name: Build and Push Microservices to Docker Hub

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'authentication-service/**'
      - 'order-service/**'
      - 'product-service/**'
      - 'inventory-service/**'
      - 'chatbot-service/**'
      - 'grpc-contract/**'
      - '.github/workflows/deploy-services.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB 1: Dynamic Scanner
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      active_services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Paths Filter Check
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            authentication-service: ['authentication-service/**', 'grpc-contract/**', '.github/workflows/deploy-services.yml']
            order-service: ['order-service/**', 'grpc-contract/**', '.github/workflows/deploy-services.yml']
            product-service: ['product-service/**', 'grpc-contract/**', '.github/workflows/deploy-services.yml']
            inventory-service: ['inventory-service/**', 'grpc-contract/**', '.github/workflows/deploy-services.yml']
            chatbot-service: ['chatbot-service/**', 'grpc-contract/**', '.github/workflows/deploy-services.yml']

      - name: Generate Active Services Matrix Array
        id: set-matrix
        run: |
          SERVICES=()
          if [ "${{ steps.filter.outputs.authentication-service }}" = "true" ]; then SERVICES+=('"authentication-service"'); fi
          if [ "${{ steps.filter.outputs.order-service }}" = "true" ]; then SERVICES+=('"order-service"'); fi
          if [ "${{ steps.filter.outputs.product-service }}" = "true" ]; then SERVICES+=('"product-service"'); fi
          if [ "${{ steps.filter.outputs.inventory-service }}" = "true" ]; then SERVICES+=('"inventory-service"'); fi
          if [ "${{ steps.filter.outputs.chatbot-service }}" = "true" ]; then SERVICES+=('"chatbot-service"'); fi
          
          JSON_ARRAY=$(IFS=,; echo "[${SERVICES[*]}]")
          echo "services=$JSON_ARRAY" >> $GITHUB_OUTPUT

  # JOB 2: Heavy-Lifting Dynamic Builder
  build-and-push:
    name: Build
    needs: changes
    if: ${{ needs.changes.outputs.active_services != '[]' && needs.changes.outputs.active_services != '' }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        service_name: ${{ fromJson(needs.changes.outputs.active_services) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Install Shared gRPC Contracts
        run: |
          cd grpc-contract
          mvn clean install -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service_name }}/Dockerfile
          build-args: |
            MODULE_NAME=${{ matrix.service_name }}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.service_name }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.service_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max