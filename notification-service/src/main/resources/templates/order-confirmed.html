<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .wrapper { width: 100%; table-layout: fixed; background-color: #f4f4f4; padding-bottom: 40px; }
        .main { background-color: #ffffff; margin: 0 auto; width: 100%; max-width: 600px; border-spacing: 0; color: #4a4a4a; border-radius: 8px; overflow: hidden; }
        .header { background-color: #27ae60; color: #ffffff; padding: 20px; text-align: center; }
        .content { padding: 30px; line-height: 1.6; }
        .status-badge { display: inline-block; background-color: #27ae60; color: #ffffff; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .btn { display: inline-block; padding: 12px 25px; background-color: #2980b9; color: #ffffff; text-decoration: none; border-radius: 5px; margin-top: 20px; }
        .footer { text-align: center; font-size: 12px; color: #888888; padding: 20px; }
    </style>
</head>
<body>
<div class="wrapper">
    <table class="main">
        <tr>
            <td class="header">
                <h1>Payment Successful!</h1>
            </td>
        </tr>
        <tr>
            <td class="content">
                <p>Great news, <strong th:text="${name}">Customer</strong>!</p>
                <p>Your payment for order <strong>#[[${orderId}]]</strong> has been confirmed. Our team is now preparing your items for shipment.</p>

                <div style="text-align: center;">
                    <span class="status-badge">Confirmed</span>
                </div>

                <p>Once your order is delivered, please share your experience with us.</p>

                <div style="text-align: center;">
                    <a href="http://localhost:4200/my-orders" class="btn">View My Orders</a>
                </div>
            </td>
        </tr>
        <tr>
            <td class="footer">
                &copy; 2026 Sitamahalakshmi E-Commerce
            </td>
        </tr>
    </table>
</div>
</body>
</html>
